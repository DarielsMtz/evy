<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería Interactiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0c;
      --surface:   #111115;
      --accent:    #c8a96e;
      --accent-dim:#7a6440;
      --text:      #f0ece4;
      --muted:     #6b6660;
      --radius:    6px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
    }

    /* ── Custom cursor – desktop only ── */
    @media (hover: hover) {
      body { cursor: none; }
      #cursor {
        position: fixed; top: 0; left: 0; z-index: 9999;
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--accent); pointer-events: none;
        transform: translate(-50%,-50%);
        transition: width .2s, height .2s, opacity .2s;
        mix-blend-mode: difference;
      }
      #cursor.hover { width: 36px; height: 36px; opacity: .6; }
    }

    /* ── Stage ── */
    #stage { position: fixed; inset: 0; overflow: hidden; }

    #stage::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%,
        transparent 20%, rgba(10,10,12,.5) 60%, rgba(10,10,12,.94) 100%);
      pointer-events: none; z-index: 2;
    }

    /* ── Floating photo cards ── */
    .photo-card {
      position: absolute; border-radius: var(--radius);
      overflow: hidden; cursor: pointer; opacity: 0;
      will-change: transform, opacity;
      box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 .5px rgba(255,255,255,.06);
      transition: box-shadow .25s; z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }
    @media (hover: hover) {
      .photo-card { cursor: none; }
      .photo-card:hover {
        box-shadow: 0 12px 48px rgba(0,0,0,.8),
          0 0 0 1px var(--accent-dim),
          inset 0 0 0 1px rgba(200,169,110,.12);
        z-index: 3;
      }
      .photo-card:hover .tap-hint { background: rgba(10,10,12,.45); opacity: 1; }
    }
    .photo-card img {
      display: block; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none;
    }
    .tap-hint {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; padding: 10px 12px;
      opacity: 0; transition: opacity .3s, background .3s;
    }
    .tap-hint span {
      font-size: 9px; letter-spacing: .15em;
      text-transform: uppercase; color: var(--accent);
    }

    /* ── Hero center ── */
    #hero {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
      text-align: center; padding: 20px;
    }

    .hero-eyebrow {
      font-size: clamp(8px, 1.8vw, 10px);
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--accent); margin-bottom: clamp(10px, 2vw, 18px);
      opacity: 0; animation: fadeUp .9s .4s forwards;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(2.2rem, 7.5vw, 5.5rem);
      line-height: 1.05; letter-spacing: -.01em; color: var(--text);
      opacity: 0; animation: fadeUp 1.1s .6s forwards;
    }
    .hero-title em { font-style: italic; color: var(--accent); }

    .hero-sub {
      font-size: clamp(7px, 1.6vw, 11px);
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); font-weight: 300;
      margin-top: clamp(8px, 1.5vw, 14px);
      opacity: 0; animation: fadeUp .9s .85s forwards;
    }
    .hero-divider {
      width: 1px; height: clamp(22px, 4vw, 36px);
      background: linear-gradient(to bottom, transparent, var(--accent-dim), transparent);
      margin: clamp(16px, 3vw, 28px) 0;
      opacity: 0; animation: fadeUp .8s 1s forwards;
    }
    .hero-cta {
      pointer-events: all; font-family: 'Montserrat', sans-serif;
      font-size: clamp(8px, 1.6vw, 10px); letter-spacing: .3em;
      text-transform: uppercase; color: var(--bg); background: var(--accent);
      border: none;
      padding: clamp(10px, 1.8vw, 14px) clamp(22px, 4vw, 36px);
      border-radius: 2px; position: relative; overflow: hidden;
      opacity: 0; animation: fadeUp .9s 1.1s forwards;
      transition: background .25s; -webkit-tap-highlight-color: transparent;
    }
    @media (hover: hover) {
      .hero-cta { cursor: none; }
      .hero-cta::before {
        content: ''; position: absolute; inset: 0;
        background: rgba(255,255,255,.15);
        transform: translateX(-105%);
        transition: transform .4s cubic-bezier(.4,0,.2,1);
      }
      .hero-cta:hover::before { transform: translateX(0); }
      .hero-cta:hover { background: #d4b87a; }
    }
    .hero-cta:active { background: #b89458; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,10,12,.88);
      backdrop-filter: blur(18px) saturate(.6);
      -webkit-backdrop-filter: blur(18px) saturate(.6);
      opacity: 0; pointer-events: none; transition: opacity .4s;
      padding: 16px;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      position: relative; display: flex;
      width: 100%; max-width: min(860px, 96vw); max-height: 90vh;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 32px 96px rgba(0,0,0,.8);
      transform: scale(.95) translateY(16px);
      transition: transform .4s cubic-bezier(.4,0,.2,1);
    }
    #lightbox.open .lb-inner { transform: scale(1) translateY(0); }

    .lb-img {
      flex: 0 0 50%; aspect-ratio: 3/4;
      object-fit: cover; display: block;
    }
    .lb-info {
      background: var(--surface); flex: 1; overflow-y: auto;
      padding: clamp(28px, 5vw, 48px) clamp(24px, 4vw, 40px);
      display: flex; flex-direction: column; justify-content: center;
    }
    .lb-num {
      font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 18px;
    }
    .lb-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 300;
      line-height: 1.1; color: var(--text); margin-bottom: 14px;
    }
    .lb-desc {
      font-size: clamp(11px, 1.4vw, 12px);
      line-height: 1.85; color: var(--muted); font-weight: 300;
    }
    .lb-close {
      position: absolute; top: 14px; right: 14px;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,10,12,.7);
      color: var(--muted); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .lb-close:hover { border-color: var(--accent); color: var(--accent); }

    /* Mobile: lightbox stacks vertically and slides from bottom */
    @media (max-width: 600px) {
      #lightbox { align-items: flex-end; padding: 0; }
      .lb-inner {
        flex-direction: column;
        max-height: 92vh; border-radius: 16px 16px 0 0;
        transform: translateY(40px) scale(.98);
      }
      #lightbox.open .lb-inner { transform: translateY(0) scale(1); }
      .lb-img { flex: 0 0 auto; width: 100%; aspect-ratio: 4/3; max-height: 45vh; }
      .lb-info { padding: 24px 22px 32px; justify-content: flex-start; }
    }

    /* Tablet */
    @media (min-width: 601px) and (max-width: 860px) {
      .lb-img { flex: 0 0 45%; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Film grain ── */
    #grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: .026; pointer-events: none; z-index: 50;
      animation: grain 8s steps(1) infinite;
    }
    @keyframes grain {
      0%  { transform: translate(0,0); }   25% { transform: translate(-3%,2%); }
      50% { transform: translate(4%,-1%); } 75% { transform: translate(-2%,4%); }
    }

    /* ── Center pulse ── */
    #glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: clamp(160px, 35vw, 320px);
      height: clamp(160px, 35vw, 320px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: pulse 4s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: translate(-50%,-50%) scale(1);   opacity: .6; }
      to   { transform: translate(-50%,-50%) scale(1.4); opacity: 1;  }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="grain"></div>
  <div id="glow"></div>
  <div id="stage"></div>

  <section id="hero" role="banner">
    <p class="hero-eyebrow">Colección permanente</p>
    <h1 class="hero-title">Instantes<br><em>eternos</em></h1>
    <p class="hero-sub">Fotografía documental · 2024</p>
    <div class="hero-divider"></div>
    <button class="hero-cta" id="ctaBtn">Explorar galería</button>
  </section>

  <div id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-inner">
      <img class="lb-img" id="lbImg" src="" alt="" />
      <div class="lb-info">
        <p class="lb-num"  id="lbNum"></p>
        <h2 class="lb-title" id="lbTitle"></h2>
        <p class="lb-desc"  id="lbDesc"></p>
      </div>
      <button class="lb-close" id="lbClose" aria-label="Cerrar">✕</button>
    </div>
  </div>

<script>
/* ── PHOTO DATA (Unsplash stock) ────────────────────────────── */
const PHOTOS = [
  {
    id:'1506905925346-21bda4d32df4', aspect:'portrait',
    title:'Cima en calma',
    desc:'El amanecer disuelve la noche en capas de luz difusa. Tomada al filo de las 6:12 h, esta imagen captura el instante exacto en que el mundo recupera su forma entre los picos.'
  },
  {
    id:'1519681393784-d120267933ba', aspect:'portrait',
    title:'Firmamento abierto',
    desc:'La Vía Láctea sobre los Alpes. A 2 800 metros de altitud, la ausencia de contaminación lumínica convierte el cielo en un mapa vivo. Exposición de 25 segundos, ISO 3200.'
  },
  {
    id:'1441974231531-c6227db76b6e', aspect:'portrait',
    title:'Túnel de luz',
    desc:'Un sendero en el Parque Nacional de los Redwoods. La luz filtrada entre los troncos no ilumina: susurra. El bosque tiene su propio idioma y esta foto intenta transcribirlo.'
  },
  {
    id:'1470071459604-3b5ec3a7fe05', aspect:'landscape',
    title:'Oro tardío',
    desc:'La última hora de luz sobre las colinas toscanas. Cada verano, los mismos campos vuelven a pintarse de dorado como si fuera la primera vez. El tiempo no avanza aquí; se repite.'
  },
  {
    id:'1477959858617-67f85cf4f1df', aspect:'landscape',
    title:'Ciudad en vela',
    desc:'Manhattan a las 3 de la madrugada. Cuando todos duermen, la ciudad no apaga las luces: las baja de volumen. Un millón de ventanas, cada una con su historia encendida.'
  },
  {
    id:'1501854140801-50d01698950b', aspect:'portrait',
    title:'Niebla viva',
    desc:'Amanecer en los Cárpatos. La niebla asciende entre los pinos como una marea lenta. Esta fotografía tardó tres madrugadas consecutivas en encontrar esta luz exacta.'
  },
  {
    id:'1518173946687-a4c8892bbd9f', aspect:'portrait',
    title:'Geometría vertical',
    desc:'Los rascacielos de Chicago desde el río. La arquitectura como ambición congelada en acero y cristal. La ciudad no se construyó hacia arriba para tocar el cielo: lo hizo para que el cielo la notara.'
  },
  {
    id:'1493246507139-91e8fad9978e', aspect:'landscape',
    title:'Reflejo exacto',
    desc:'El lago Moraine en Alberta, Canadá. La superficie guarda una copia perfecta del mundo hasta que el viento decide romperla. Esta imagen existe gracias a diez segundos de calma absoluta.'
  },
  {
    id:'1504701954957-2010ec3bcec1', aspect:'landscape',
    title:'Desierto vivo',
    desc:'Las dunas del Sahara al atardecer. El desierto no está vacío: está lleno de silencio. Y el silencio, a estas horas de luz rasante, tiene textura, sombra y movimiento propio.'
  },
  {
    id:'1535591273668-578e31182c4f', aspect:'portrait',
    title:'Cascada muda',
    desc:'Skógafoss, Islandia, en invierno. A -12 °C, el agua sigue cayendo. La cámara captura un segundo de algo que lleva miles de años ocurriendo sin público y sin pausa.'
  },
  {
    id:'1510797215324-95aa89f43c33', aspect:'landscape',
    title:'Costa quebrada',
    desc:'Los acantilados de Moher bajo tormenta. El mar no convence: impone. Y aun así, todo el mundo se acerca al borde. Algo en nosotros reconoce ese poder y quiere mirarle a los ojos.'
  },
  {
    id:'1525193612562-aa34e4f3e8f7', aspect:'landscape',
    title:'Lluvia de color',
    desc:'Festival Holi en Jodhpur. Durante unos minutos, el color lo borra todo: las diferencias, los nombres, la distancia entre las personas. La fotografía intenta detener ese momento de igualdad.'
  },
];

/* ── HELPERS ─────────────────────────────────────────────────── */
const mobile  = () => window.innerWidth < 600;
const tablet  = () => window.innerWidth < 900;
const cx      = () => window.innerWidth  / 2;
const cy      = () => window.innerHeight / 2;
const maxR    = () => Math.max(window.innerWidth, window.innerHeight) * (mobile() ? .52 : .65);

function photoSize(aspect) {
  const s = mobile() ? .52 : tablet() ? .7 : 1;
  const v = .75 + Math.random() * .45;
  return aspect === 'portrait'
    ? { w: Math.round(170 * s * v), h: Math.round(240 * s * v) }
    : { w: Math.round(240 * s * v), h: Math.round(168 * s * v) };
}

function unsplash(id, w, h) {
  return `https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=${w}&q=75`;
}

/* ── CURSOR (desktop) ────────────────────────────────────────── */
const cursorEl = document.getElementById('cursor');
if (cursorEl && matchMedia('(hover:hover)').matches) {
  document.addEventListener('mousemove', e => {
    cursorEl.style.cssText = `left:${e.clientX}px;top:${e.clientY}px`;
  });
}
function withHover(el) {
  if (!cursorEl) return;
  el.addEventListener('mouseenter', () => cursorEl.classList.add('hover'));
  el.addEventListener('mouseleave', () => cursorEl.classList.remove('hover'));
}

/* ── SPAWN LOOP ──────────────────────────────────────────────── */
const stage = document.getElementById('stage');
let idx = 0;
const INTERVAL = mobile() ? 1100 : 850;
const TRAVEL   = mobile() ? 4000 : 4800;

function spawn() {
  const data = PHOTOS[idx++ % PHOTOS.length];
  const { w, h } = photoSize(data.aspect);
  const angle    = Math.random() * Math.PI * 2;
  const r0 = initRot(), r1 = r0 + (Math.random() - .5) * 14;

  function initRot() { return (Math.random() - .5) * 9; }

  const card = document.createElement('div');
  card.className = 'photo-card';
  Object.assign(card.style, {
    width: w + 'px', height: h + 'px',
    left: cx() - w/2 + 'px', top: cy() - h/2 + 'px',
    transform: `rotate(${r0}deg)`
  });

  const img = document.createElement('img');
  img.src = unsplash(data.id, w * 2, h * 2);
  img.alt = data.title;
  img.loading = 'lazy';
  img.draggable = false;

  const hint = document.createElement('div');
  hint.className = 'tap-hint';
  hint.innerHTML = '<span>Ver detalle</span>';

  card.append(img, hint);
  stage.appendChild(card);

  card.addEventListener('click', () => openLb(data));
  withHover(card);

  /* travel */
  const dist  = maxR() * (.45 + Math.random() * .55);
  const sx = cx() - w/2, sy = cy() - h/2;
  const dx = cx() + Math.cos(angle) * dist - w/2;
  const dy = cy() + Math.sin(angle) * dist - h/2;
  const t0 = performance.now();

  (function tick(now) {
    const p = Math.min((now - t0) / TRAVEL, 1);
    const e = 1 - Math.pow(1 - p, 3);

    card.style.left      = sx + (dx - sx) * e + 'px';
    card.style.top       = sy + (dy - sy) * e + 'px';
    card.style.transform = `rotate(${r0 + (r1 - r0) * e}deg)`;

    const fi = .2, ho = .65;
    card.style.opacity = p < fi ? p/fi : p < ho ? 1 : Math.max(0, 1-(p-ho)/(1-ho));

    p < 1 ? requestAnimationFrame(tick) : card.remove();
  })(t0);
}

const burst = mobile() ? 3 : 5;
for (let i = 0; i < burst; i++) setTimeout(spawn, i * 200);
setInterval(spawn, INTERVAL);

/* ── LIGHTBOX ────────────────────────────────────────────────── */
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lbImg');
const lbTitle = document.getElementById('lbTitle');
const lbDesc  = document.getElementById('lbDesc');
const lbNum   = document.getElementById('lbNum');
const lbClose = document.getElementById('lbClose');

function openLb(data) {
  const n  = PHOTOS.indexOf(data) + 1;
  const lw = mobile() ? 800  : 1400;
  const lh = mobile() ? 600  : 1800;
  lbImg.src             = unsplash(data.id, lw, lh);
  lbImg.alt             = data.title;
  lbTitle.textContent   = data.title;
  lbDesc.textContent    = data.desc;
  lbNum.textContent     = `${String(n).padStart(2,'0')} / ${String(PHOTOS.length).padStart(2,'0')}`;
  lb.classList.add('open');
}

function closeLb() { lb.classList.remove('open'); }

lbClose.addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
withHover(lbClose);

/* ── CTA ─────────────────────────────────────────────────────── */
const cta = document.getElementById('ctaBtn');
cta.addEventListener('click', () => {
  const n = mobile() ? 4 : 7;
  for (let i = 0; i < n; i++) setTimeout(spawn, i * 100);
});
withHover(cta);
</script>
</body>
</html>
