<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería Interactiva | Álbumes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="cursor"></div>
  <div id="grain"></div>
  <div id="glow"></div>
  <div id="stage"></div>

  <section id="hero" role="banner">
    <p class="hero-eyebrow">Colección permanente</p>
    <h1 class="hero-title">Instantes<br><em>eternos</em></h1>
    <p class="hero-sub">Fotografía documental · 2024</p>
    <div class="hero-divider"></div>
    <button class="hero-cta" id="ctaBtn">Explorar galería</button>
  </section>

  <div id="grid-modal" role="dialog" aria-modal="true" aria-label="Explorador de colecciones">
    <div class="gm-header">
      <div class="gm-header-left">
        <button class="gm-back" id="gmBack" style="display: none;" aria-label="Volver a álbumes">
          <svg viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
          </svg>
          Volver a álbumes
        </button>
        <span class="gm-eyebrow" id="gmEyebrow">Categorías</span>
        <h2 class="gm-title" id="gmTitle">Álbumes</h2>
        <span class="gm-count" id="gmCount"></span>
      </div>
      <button class="gm-close" id="gmClose" aria-label="Cerrar ventana">
        <svg width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M18 6l-12 12" />
          <path d="M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="gm-body">
      <div id="gmGrid"></div>
    </div>
  </div>

  <div id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-inner">
      <img class="lb-img" id="lbImg" src="" alt="" />
      <div class="lb-info">
        <span class="lb-album" id="lbAlbumTag"></span>
        <p class="lb-num" id="lbNum"></p>
        <h2 class="lb-title" id="lbTitle"></h2>
        <p class="lb-desc" id="lbDesc"></p>
      </div>
      <button class="lb-close" id="lbClose" aria-label="Cerrar imagen">
        <svg width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M18 6l-12 12" />
          <path d="M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
</body>

</html>
