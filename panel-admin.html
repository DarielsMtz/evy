<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control | Galería</title>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DEFAULT_TEXTS = {
      eyebrow: "Colección permanente",
      title: "Instantes<br><em>eternos</em>",
      sub: "Fotografía documental · 2024",
      cta: "Explorar galería",
      gmEyebrow: "Categorías",
      gmTitle: "Álbumes"
    };

    const Icons = {
      Image: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>,
      Type: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 21v-8.25M15.75 21h-7.5M3 5.621a48.474 48.474 0 0 1 6-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 0 1-3.827-5.802" /></svg>,
      Save: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>,
      Plus: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>,
      Trash: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>,
      Lock: () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>
    };

    function App() {
      // --- SISTEMA DE LOGIN ---
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState(false);
      const ADMIN_PASSWORD = "admin123"; // Cambia esta contraseña por la tuya

      const [texts, setTexts] = useState(DEFAULT_TEXTS);
      const [photos, setPhotos] = useState([]);
      const [activeTab, setActiveTab] = useState('textos');
      const [showModal, setShowModal] = useState(false);
      const [editingPhoto, setEditingPhoto] = useState(null);

      // Cargar datos locales al iniciar
      useEffect(() => {
        // Verificar si la sesión estaba activa en esta pestaña
        if(sessionStorage.getItem('admin_auth') === 'true') {
          setIsAuthenticated(true);
        }

        const stored = localStorage.getItem('nuestra_historia_datos');
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            if (parsed.texts) setTexts(parsed.texts);
            if (parsed.photos) setPhotos(parsed.photos);
          } catch(e) { console.error("Error cargando datos", e); }
        }
      }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        if (passwordInput === ADMIN_PASSWORD) {
          setIsAuthenticated(true);
          setLoginError(false);
          sessionStorage.setItem('admin_auth', 'true'); // Mantiene la sesión mientras no se cierre la pestaña
        } else {
          setLoginError(true);
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        sessionStorage.removeItem('admin_auth');
        setPasswordInput('');
      };

      const saveToLocal = () => {
        localStorage.setItem('nuestra_historia_datos', JSON.stringify({ texts, photos }));
        alert('¡Cambios guardados! Abre o recarga tu archivo index.html para ver la galería actualizada.');
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            const MAX_SIZE = 1000; 

            const isLandscape = width > height;

            if (width > height && width > MAX_SIZE) {
              height *= MAX_SIZE / width;
              width = MAX_SIZE;
            } else if (height > MAX_SIZE) {
              width *= MAX_SIZE / height;
              height = MAX_SIZE;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            setEditingPhoto({
              ...editingPhoto,
              url: dataUrl,
              aspect: isLandscape ? 'landscape' : 'portrait'
            });
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const savePhoto = (e) => {
        e.preventDefault();
        if (editingPhoto.isNew) {
          setPhotos([{ ...editingPhoto, isNew: undefined, id: Date.now().toString() }, ...photos]);
        } else {
          setPhotos(photos.map(p => p.id === editingPhoto.id ? editingPhoto : p));
        }
        setShowModal(false);
      };

      const deletePhoto = (id) => {
        if(confirm('¿Seguro que deseas borrar esta foto?')) {
          setPhotos(photos.filter(p => p.id !== id));
        }
      };

      // --- PANTALLA DE LOGIN ---
      if (!isAuthenticated) {
        return (
          <div className="flex h-screen bg-slate-900 items-center justify-center font-sans px-4">
            <form onSubmit={handleLogin} className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center fade-in">
              <div className="bg-[#c8a96e]/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-[#c8a96e]">
                <Icons.Lock />
              </div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">Panel de Control</h2>
              <p className="text-sm text-gray-500 mb-6">Ingresa tu contraseña para editar la galería.</p>
              
              <input 
                type="password" 
                placeholder="Contraseña"
                value={passwordInput}
                onChange={(e) => setPasswordInput(e.target.value)}
                className={`w-full p-3 border rounded-lg focus:ring-2 outline-none mb-4 ${loginError ? 'border-red-500 focus:ring-red-500' : 'focus:ring-[#c8a96e]'}`}
              />
              
              {loginError && <p className="text-red-500 text-sm mb-4">Contraseña incorrecta</p>}
              
              <button type="submit" className="w-full bg-[#c8a96e] hover:bg-[#b89458] text-slate-900 font-bold py-3 rounded-lg transition">
                Entrar al Panel
              </button>
            </form>
          </div>
        );
      }

      // --- PANTALLA PRINCIPAL DEL ADMIN ---
      return (
        <div className="flex h-screen bg-gray-100 font-sans fade-in">
          {/* Sidebar */}
          <aside className="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
            <div className="p-6">
              <h1 className="text-xl font-bold text-[#c8a96e]">Panel de Control</h1>
              <p className="text-xs text-gray-400 mt-1">Gestor de Galería</p>
            </div>
            <nav className="flex-1 px-4 space-y-2">
              <button 
                onClick={() => setActiveTab('textos')} 
                className={`flex items-center gap-3 w-full p-3 rounded-lg transition-colors ${activeTab === 'textos' ? 'bg-slate-800 text-white' : 'text-gray-400 hover:bg-slate-800'}`}
              >
                <Icons.Type /> Textos e Interfaz
              </button>
              <button 
                onClick={() => setActiveTab('fotos')} 
                className={`flex items-center gap-3 w-full p-3 rounded-lg transition-colors ${activeTab === 'fotos' ? 'bg-slate-800 text-white' : 'text-gray-400 hover:bg-slate-800'}`}
              >
                <Icons.Image /> Fotografías ({photos.length})
              </button>
            </nav>
            <div className="p-4 space-y-2">
              <button onClick={saveToLocal} className="flex items-center justify-center gap-2 w-full bg-[#c8a96e] hover:bg-[#b89458] text-slate-900 font-bold py-3 px-4 rounded-lg transition">
                <Icons.Save /> Guardar
              </button>
              <button onClick={handleLogout} className="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-700 text-white py-3 px-4 rounded-lg transition">
                Cerrar sesión
              </button>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 p-8 overflow-y-auto">
            {activeTab === 'textos' && (
              <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 fade-in">
                <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Textos Principales</h2>
                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Pequeño texto superior (Eyebrow)</label>
                    <input type="text" value={texts.eyebrow} onChange={(e) => setTexts({...texts, eyebrow: e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Título Grande (Puedes usar HTML como {'<em>'} para cursiva)</label>
                    <textarea value={texts.title} onChange={(e) => setTexts({...texts, title: e.target.value})} rows="2" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none"></textarea>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Subtítulo (Fechas o mensajes)</label>
                    <input type="text" value={texts.sub} onChange={(e) => setTexts({...texts, sub: e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Botón principal (Call to Action)</label>
                    <input type="text" value={texts.cta} onChange={(e) => setTexts({...texts, cta: e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none" />
                  </div>
                  
                  <h3 className="text-lg font-bold mt-8 mb-4 text-gray-800 border-b pb-2">Ventana de Álbumes</h3>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Texto superior modal</label>
                      <input type="text" value={texts.gmEyebrow} onChange={(e) => setTexts({...texts, gmEyebrow: e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Título de los álbumes</label>
                      <input type="text" value={texts.gmTitle} onChange={(e) => setTexts({...texts, gmTitle: e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[#c8a96e] outline-none" />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'fotos' && (
              <div className="fade-in max-w-5xl mx-auto">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold text-gray-800">Tus Fotografías</h2>
                  <button 
                    onClick={() => {
                      setEditingPhoto({ isNew: true, title: '', desc: '', album: 'Momentos Especiales', url: '', aspect: 'portrait' });
                      setShowModal(true);
                    }}
                    className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white py-2 px-4 rounded-lg transition"
                  >
                    <Icons.Plus /> Añadir Foto
                  </button>
                </div>

                {photos.length === 0 ? (
                  <div className="text-center p-12 bg-white rounded-xl border border-dashed border-gray-300">
                    <p className="text-gray-500 mb-4">Aún no has añadido fotos personalizadas.</p>
                    <p className="text-xs text-gray-400">Si no añades ninguna, se mostrarán las de ejemplo por defecto en tu galería.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {photos.map(p => (
                      <div key={p.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 group relative">
                        <div className="aspect-[4/3] bg-gray-100">
                          <img src={p.url || `https://images.unsplash.com/photo-${p.id}?w=400&q=75`} className="w-full h-full object-cover" />
                        </div>
                        <div className="p-4">
                          <span className="text-[10px] font-bold tracking-wider uppercase text-[#c8a96e] bg-[#c8a96e]/10 px-2 py-1 rounded">{p.album}</span>
                          <h3 className="font-bold mt-2 truncate text-gray-800">{p.title}</h3>
                        </div>
                        <div className="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition">
                          <button onClick={() => { setEditingPhoto(p); setShowModal(true); }} className="bg-white text-slate-800 p-2 rounded-full shadow hover:bg-gray-50">
                             ✏️
                          </button>
                          <button onClick={() => deletePhoto(p.id)} className="bg-red-50 text-red-600 p-2 rounded-full shadow hover:bg-red-100">
                             <Icons.Trash />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Modal Editor de Foto */}
          {showModal && editingPhoto && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
              <div className="bg-white rounded-2xl w-full max-w-xl overflow-hidden shadow-2xl">
                <form onSubmit={savePhoto}>
                  <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h3 className="text-xl font-bold text-gray-800">{editingPhoto.isNew ? 'Nueva Memoria' : 'Editar Foto'}</h3>
                    <button type="button" onClick={() => setShowModal(false)} className="text-gray-400 hover:text-gray-600">✕</button>
                  </div>
                  <div className="p-6 space-y-4">
                    
                    {/* Imagen Input */}
                    <div>
                       <label className="block text-sm font-medium text-gray-700 mb-1">Subir Imagen</label>
                       <input type="file" accept="image/*" onChange={handleImageUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[#c8a96e]/10 file:text-[#7a6440] hover:file:bg-[#c8a96e]/20" />
                       {editingPhoto.url && (
                         <img src={editingPhoto.url} className="mt-4 h-32 w-auto object-cover rounded-lg shadow-sm border" />
                       )}
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Título</label>
                        <input required type="text" value={editingPhoto.title} onChange={e => setEditingPhoto({...editingPhoto, title: e.target.value})} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-[#c8a96e]" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Álbum (Categoría)</label>
                        <input required type="text" value={editingPhoto.album} onChange={e => setEditingPhoto({...editingPhoto, album: e.target.value})} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-[#c8a96e]" placeholder="Ej: Nuestros Viajes" />
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Descripción / Recuerdo</label>
                      <textarea required value={editingPhoto.desc} onChange={e => setEditingPhoto({...editingPhoto, desc: e.target.value})} rows="3" className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-[#c8a96e]"></textarea>
                    </div>

                  </div>
                  <div className="bg-gray-50 p-6 border-t border-gray-100 flex justify-end gap-3">
                    <button type="button" onClick={() => setShowModal(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">Cancelar</button>
                    <button type="submit" className="bg-[#c8a96e] hover:bg-[#b89458] text-slate-900 font-bold px-6 py-2 rounded-lg transition shadow-md">Guardar Foto</button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
